<!DOCTYPE html>
<html lang="en">
<head>
	<title>HighWay-ColorStreet</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="author" content="Trex-Codes">
	<meta name="Description" content="Highway ColorStreet Animation">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="Styles.css">
</head>
<body>
	
	<!-- SIDEBAR CONTROLS -->
	<aside class="sidebar">
		<div class="sidebar-header">
			<h1>Landscapes</h1>
			<p>Customize your scenery</p>
		</div>

		<div class="settings-container">
			
			<!-- NEW ADVANCED CONTROLS -->
			<div class="control-group">
				<label>Time of Day</label>
				<input type="range" id="timeOfDay" min="0" max="24" step="0.1" value="12" class="slider">
			</div>
			
			<div class="control-group flex-row">
				<label>CRT Retro Filter</label>
				<label class="switch">
					<input type="checkbox" id="crtToggle" checked>
					<span class="slider-toggle rounded"></span>
				</label>
			</div>
			
			<div class="control-group flex-row">
				<label>Parallax 3D FX</label>
				<label class="switch">
					<input type="checkbox" id="parallaxToggle" checked>
					<span class="slider-toggle rounded"></span>
				</label>
			</div>

			<hr class="separator">

			<div class="control-group">
				<label>Sky Base Color</label>
				<div class="palette" id="palette-sky"></div>
			</div>
			
			<div class="control-group">
				<label>Sun Base Color</label>
				<div class="palette" id="palette-sun"></div>
			</div>
			
			<div class="control-group">
				<label>Mountains Base Color</label>
				<div class="palette" id="palette-mountains"></div>
			</div>
			
			<div class="control-group">
				<label>Highway Base Color</label>
				<div class="palette" id="palette-highway"></div>
			</div>
			
			<div class="control-group">
				<label>Lines Base Color</label>
				<div class="palette" id="palette-lines"></div>
			</div>
		</div>

		<div class="sidebar-footer">
			<button id="toggleAnimation" class="btn-action">Pause Animation</button>
		</div>
	</aside>

	<!-- MAIN CANVAS CONTAINER -->
	<main class="canvas-container">
		<canvas id="CanvasHTml"></canvas>
		<div id="crtOverlay" class="crt-overlay active"></div>
	</main>

	<!-- SCRIPTS -->
	<script type="text/javascript" src="Figures/Sky.js"></script>
	<script type="text/javascript" src="Figures/Sun.js"></script>
	<script type="text/javascript" src="Figures/Mountains.js"></script>
	<script type="text/javascript" src="Figures/Highway.js"></script>
	<script type="text/javascript" src="Figures/LinesHighWay.js"></script>
	<script type="text/javascript" src="Figures/Roadside.js"></script> <!-- NEW 3D OBJECTS -->
	<script type="text/javascript" src="Main.js"></script>
</body>
</html>
